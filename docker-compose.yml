services:
  # ── MariaDB ────────────────────────────────────────────────
  db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-sophishticated}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  # ── App (Apache + PHP + Cron) ──────────────────────────────
  app:
    build:
      context: .
      target: app
    ports:
      - "${APP_PORT:-8443}:80"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./templates:/var/www/html/templates
      - app_storage:/var/www/html/storage
    restart: unless-stopped

  # ── Queue Worker ───────────────────────────────────────────
  worker:
    build:
      context: .
      target: worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./templates:/var/www/html/templates
      - app_storage:/var/www/html/storage
    restart: always

  # ── WebSocket Server (Ratchet) ─────────────────────────────
  websocket:
    build:
      context: .
      target: websocket
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  db_data:
  app_storage:
